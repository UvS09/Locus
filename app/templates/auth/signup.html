{% extends "base.html" %}

{% block title %}Local Signup{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5">
        <div class="card shadow-sm border-0 rounded-4">
            <div class="card-body p-4">
                <h2 class="h3 mb-2">Create Local Admin</h2>
                <form method="post" action="/signup" class="vstack gap-3">
                    <div>
                        <label class="form-label">Full Name</label>
                        <input class="form-control" type="text" name="full_name" value="{{ form_full_name or '' }}" required>
                    </div>
                    <div>
                        <label class="form-label">Email</label>
                        <input class="form-control" type="email" name="email" value="{{ form_email or '' }}" required>
                    </div>
                    <div>
                        <label class="form-label">Password</label>
                        <input class="form-control" type="password" name="password" minlength="8" data-password-rules required>
                    </div>
                    <button class="btn btn-primary" type="submit">Create Admin Account</button>
                    <a class="btn btn-outline-secondary" href="/login">Back to Login</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
